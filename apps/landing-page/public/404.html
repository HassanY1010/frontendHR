<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الموارد البشرية الذكي</title>
  <script>
    // SPA Routing Fix: store the path then redirect to root
    // The app reads sessionStorage.redirect on load and navigates there
    sessionStorage.setItem('spa_redirect', window.location.pathname + window.location.search);
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
