server {
    listen 80;
    server_name _;

    # Landing page at root
    location / {
        root /usr/share/nginx/html/landing;
        try_files $uri $uri/ /index.html;
    }

    # Employee PWA
    location /employee {
        alias /usr/share/nginx/html/employee;
        try_files $uri $uri/ /employee/index.html;
    }

    # Manager dashboard
    location /manager {
        alias /usr/share/nginx/html/manager;
        try_files $uri $uri/ /manager/index.html;
    }

    # Owner dashboard
    location /owner {
        alias /usr/share/nginx/html/owner;
        try_files $uri $uri/ /owner/index.html;
    }

    # Interview page (public, under landing or dedicated)
    location /interview {
        alias /usr/share/nginx/html/landing;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads proxy
    location /uploads/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }
}
